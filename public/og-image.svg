<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Cream background -->
  <rect width="1200" height="630" fill="#F5EFE6"/>

  <!-- Top-left logo box -->
  <rect x="64" y="56" width="56" height="56" rx="12" fill="#0A0A0A"/>
  <path
    d="M93 72 C93 72 86 65 78 68 C71 71 68 79 71 87 C74 95 82 98 90 95 C97 93 100 86 100 86"
    stroke="#C4F542" stroke-width="4.5" stroke-linecap="round" fill="none"
  />
  <circle cx="102" cy="80" r="3.5" fill="#C4F542"/>

  <!-- Brand name -->
  <text x="134" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0A0A0A">Codewave Studio</text>

  <!-- Main headline -->
  <text x="64" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#0A0A0A" letter-spacing="-2">Websites &amp; Software for</text>
  <text x="64" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#0A0A0A" letter-spacing="-2">USA Small Businesses.</text>

  <!-- Subtitle -->
  <text x="64" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#6B6B5C">Fixed pricing · Delivered in 7 days · Starting at $299</text>

