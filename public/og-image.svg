  <text x="204" y="544" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A">Get a Free Quote →</text>

  <!-- Domain bottom-right -->
  <text x="1136" y="544" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6B6B5C">codewavestudio.xyz</text>
